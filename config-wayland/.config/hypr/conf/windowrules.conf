# Window Rules for Hyprland 0.55
# Note: windowrule/windowrulev2 are deprecated since 0.55 but still functional.
# When migrating to hyprland.lua, use hl.window_rule({...}) instead.

# ---- FLOAT RULES ----
windowrulev2 = float, class:^(keepassxc)$
windowrulev2 = move 100%-600 100%-400, class:^(keepassxc)$
windowrule = float, title:^(File Operation Progress)$
windowrulev2 = move 83% 50%, class:^(Authy)$
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$

# ---- FILE DIALOGS ----
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = size 70% 70%, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = center, class:^(xdg-desktop-portal-gtk)$
windowrule = float, title:^(Enter name of file to save to…)$
windowrule = size 720 380, title:^(Enter name of file to save to…)$

# ---- ROFI & WLOGOUT ----
windowrulev2 = float, class:^(rofi)$
windowrulev2 = stayfocused, class:^(rofi)$
windowrule = animation slide, class:^(rofi)$
windowrule = noanim, class:^(Wlogout)$
layerrule = blur, rofi
layerrule = blur, waybar
layerrule = blur, notifications

# ---- ASSISTANT ----
windowrulev2 = float, class:^(assistant)$
windowrulev2 = size 80% 70%, class:^(assistant)$
windowrulev2 = move 10% 25%, class:^(assistant)$
windowrulev2 = workspace special:assistant silent, class:^(assistant)$
windowrulev2 = suppressevent fullscreen, class:^(assistant)$

# ---- PICTURE-IN-PICTURE ----
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = size 640 360, title:^(Picture-in-Picture)$
windowrulev2 = move 100%-680 100%-400, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$

# ---- IDLE INHIBIT FOR FULLSCREEN ----
windowrulev2 = idleinhibit fullscreen, class:^(*)$